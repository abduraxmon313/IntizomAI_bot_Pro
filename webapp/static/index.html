<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Intizom AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --pr:#0ea5e9;--pr2:#06b6d4;--ac:#10b981;
  --grad:linear-gradient(135deg,#0ea5e9 0%,#06b6d4 50%,#10b981 100%);
  --grad-text:linear-gradient(135deg,#0ea5e9,#10b981);
  --bg:#040d18;--bg2:#071223;--surface:rgba(8,20,40,0.85);
  --card:rgba(10,24,48,0.75);--glass:rgba(255,255,255,0.05);
  --glass-b:rgba(255,255,255,0.1);--text:#e2e8f0;--sub:#64748b;
  --muted:#334155;--border:rgba(255,255,255,0.08);
  --nav:rgba(4,13,24,0.96);
  --success:#10b981;--warn:#f59e0b;--danger:#ef4444;
  --shadow:0 8px 32px rgba(0,0,0,0.45);
  --glow:0 0 24px rgba(14,165,233,0.35);
  --cshadow:0 4px 24px rgba(0,0,0,0.35);
}
body.light {
  --bg:#f0f9ff;--bg2:#e0f2fe;--surface:rgba(255,255,255,0.92);
  --card:rgba(255,255,255,0.88);--glass:rgba(255,255,255,0.6);
  --glass-b:rgba(14,165,233,0.18);--text:#0f172a;--sub:#475569;
  --muted:#94a3b8;--border:rgba(14,165,233,0.12);
  --nav:rgba(240,249,255,0.96);
  --shadow:0 8px 32px rgba(14,165,233,0.18);
  --glow:0 0 24px rgba(14,165,233,0.2);
  --cshadow:0 4px 24px rgba(14,165,233,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);transition:background .4s,color .4s;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}

/* Animated bg orbs */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.07;animation:orbF 9s ease-in-out infinite}
.o1{width:320px;height:320px;background:#0ea5e9;top:-120px;right:-80px;animation-delay:0s}
.o2{width:220px;height:220px;background:#10b981;bottom:80px;left:-70px;animation-delay:-3.5s}
.o3{width:160px;height:160px;background:#06b6d4;top:45%;left:55%;animation-delay:-7s}
body.light .orb{opacity:.14}
@keyframes orbF{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(22px,-18px) scale(1.06)}66%{transform:translate(-14px,14px) scale(0.94)}}

/* Layout */
#app{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1}
#page{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;scroll-behavior:smooth}
#page::-webkit-scrollbar{display:none}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--nav);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--glass-b);height:72px;display:flex;align-items:center;justify-content:space-around;padding:0 8px;transition:background .4s}
.nb{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;color:var(--sub);font-size:10px;font-weight:500;transition:color .25s,transform .2s;position:relative}
.nb.on{color:var(--pr);font-weight:600}
.nb:active{transform:scale(0.9)}
.ndot{position:absolute;bottom:8px;left:50%;width:4px;height:4px;border-radius:50%;background:var(--pr);transform:translateX(-50%)}
.nai{position:relative;bottom:20px;width:58px;height:58px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 20px rgba(14,165,233,.5),0 0 40px rgba(16,185,129,.2);transition:transform .2s}
.nai:active{transform:scale(0.88)}
.nring{position:absolute;inset:-5px;border-radius:50%;border:2px solid rgba(14,165,233,.4);animation:rp 2.5s ease-in-out infinite}
@keyframes rp{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.3);opacity:0}}

/* Cards */
.gc{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:20px;box-shadow:var(--cshadow);transition:background .4s,border-color .4s}

/* Gradient text */
.gt{background:var(--grad-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Buttons */
.btn{background:var(--grad);color:#fff;border:none;border-radius:14px;padding:13px 20px;font-size:15px;font-weight:600;width:100%;box-shadow:0 4px 16px rgba(14,165,233,.35);transition:opacity .2s,transform .15s;position:relative;overflow:hidden}
.btn:active{transform:scale(0.97);opacity:.9}
.btn:disabled{opacity:.4;cursor:default;transform:none}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:rAnim .6s linear;pointer-events:none}
@keyframes rAnim{to{transform:scale(4);opacity:0}}

/* Input */
.inp{width:100%;padding:13px 16px;background:var(--glass);border:1px solid var(--glass-b);border-radius:14px;color:var(--text);font-size:15px;transition:border-color .25s,background .25s}
.inp:focus{border-color:var(--pr);background:rgba(14,165,233,.08)}
.inp::placeholder{color:var(--sub)}
.inp option{background:var(--bg2);color:var(--text)}

/* Header */
.sh{position:sticky;top:0;z-index:50;background:var(--surface);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-b);transition:background .4s}

/* Modal */
.mov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:flex-end;animation:fi .2s ease}
.ms{width:100%;background:var(--surface);border-radius:24px 24px 0 0;padding:20px 20px 44px;animation:su .35s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
.ms::-webkit-scrollbar{display:none}
.mh{width:40px;height:4px;border-radius:2px;background:var(--glass-b);margin:0 auto 16px}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes ck{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

.fu{animation:fu .35s ease forwards}
.sk{background:linear-gradient(90deg,var(--glass) 25%,rgba(255,255,255,.05) 50%,var(--glass) 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:10px}
@keyframes sh{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* Toggle */
.tog{width:48px;height:26px;border-radius:13px;background:var(--muted);position:relative;cursor:pointer;transition:background .25s;flex-shrink:0}
.tog.on{background:var(--grad)}
.tth{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.tog.on .tth{transform:translateX(22px)}

.sl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.empty{text-align:center;padding:48px 20px}
.ei{font-size:48px;margin-bottom:12px;opacity:.6}
.fab{position:fixed;bottom:90px;right:18px;width:54px;height:54px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(14,165,233,.5);z-index:90;cursor:pointer;transition:transform .2s}
.fab:active{transform:scale(0.88)}
.pt{background:var(--glass);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;background:var(--grad);transition:width .8s cubic-bezier(.4,0,.2,1)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600}
.bk{display:flex;align-items:center;gap:6px;padding:8px 0;color:var(--pr);font-size:15px;font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit}
.sr{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--glass-b);cursor:pointer;transition:background .15s}
.sr:last-child{border-bottom:none}
.sr:active{background:var(--glass)}
.si{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,rgba(14,165,233,.15),rgba(16,185,129,.15));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.dc{flex:1;border-radius:16px;padding:12px 8px;text-align:center;cursor:pointer;min-width:0;background:var(--glass);border:1px solid var(--glass-b);transition:all .2s}
.dc.today{background:linear-gradient(135deg,rgba(14,165,233,.18),rgba(16,185,129,.18));border-color:rgba(14,165,233,.4)}
.dc:active{transform:scale(0.95)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cd{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:500;cursor:pointer;background:var(--glass);border:1px solid transparent;transition:all .2s;position:relative}
.cd.today{background:linear-gradient(135deg,rgba(14,165,233,.22),rgba(16,185,129,.22));border-color:var(--pr);color:var(--pr);font-weight:700}
.cd.hg::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--pr)}
.cd.sel{background:var(--grad);color:#fff;border-color:transparent}
.cd.om{opacity:.28}
.cd:active{transform:scale(0.92)}
.gi{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--glass-b);transition:background .15s}
.gi:last-child{border-bottom:none}
.gi:active{background:var(--glass)}
.gcb{width:22px;height:22px;border-radius:7px;border:2px solid var(--glass-b);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;background:transparent}
.gcb.done{background:var(--grad);border-color:transparent;animation:ck .3s ease}
.mc{border-radius:18px;padding:18px 16px;cursor:pointer;background:var(--glass);border:1px solid var(--glass-b);transition:all .25s;text-align:center;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:opacity .25s}
.mc.hg::before{opacity:.07}
.mc:active{transform:scale(0.97)}
.mcc{position:relative;z-index:1}
</style>
</head>
<body>
<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div id="app"><div id="page"></div><nav class="nav" id="nav"></nav></div>
<script>
(function(){
'use strict';
const tg=window.Telegram&&window.Telegram.WebApp;
if(tg){tg.ready();tg.expand();}
const tgU=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user;
const TID=tgU?tgU.id:null;
const TN=tgU?[tgU.first_name,tgU.last_name].filter(Boolean).join(' '):'Demo Foydalanuvchi';
const TUN=tgU?tgU.username||'':'';

// ── STATE ──────────────────────────────────────────────
let S={
  page:'home',isDark:true,
  tasks:[],goals:[],
  user:{full_name:TN,username:TUN,streak:0,total_score:0},
  notifs:true,
  gv:'main',    // goals view: main|monthly-list|month-detail|weekly|daily
  selMonth:null,selDay:null,
  calM:null,    // {year,month}
  modal:null,weekOff:0,
};
try{const r=localStorage.getItem('iz_v4');if(r){const p=JSON.parse(r);S.isDark=p.isDark??true;S.tasks=p.tasks||[];S.goals=p.goals||[];S.user={...S.user,...(p.user||{})};S.notifs=p.notifs??true;S.theme=p.theme||'default';}}catch(e){}

if(!S.tasks.length){
  const t=ds(new Date());
  S.tasks=[
    {id:uid(),title:"Soat 6 da turish",description:"",status:"done",plan_date:t,scheduled_time:"06:00",score_value:5,createdAt:ni()},
    {id:uid(),title:"Sport mashg'uloti",description:"30 daqiqa yugurish",status:"done",plan_date:t,scheduled_time:"07:30",score_value:5,createdAt:ni()},
    {id:uid(),title:"Kitob o'qish",description:"",status:"pending",plan_date:t,scheduled_time:"10:00",score_value:5,createdAt:ni()},
    {id:uid(),title:"Python loyiha",description:"",status:"pending",plan_date:t,scheduled_time:"14:00",score_value:5,createdAt:ni()},
    {id:uid(),title:"Ingliz tili",description:"Vocabulary takrorlash",status:"failed",plan_date:t,scheduled_time:"17:00",score_value:5,createdAt:ni()},
  ];
}
function sv(){try{localStorage.setItem('iz_v4',JSON.stringify({isDark:S.isDark,tasks:S.tasks,goals:S.goals,user:S.user,notifs:S.notifs,theme:S.theme||'default'}));}catch(e){}}

// ── UTILS ──────────────────────────────────────────────
// ── GOAL API SYNC ──────────────────────────────────────
async function apiGoalCreate(type,period,title,desc){
  if(!TID)return null;
  try{
    const r=await fetch('/api/webapp/goals?telegram_id='+TID,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({goal_type:type,period,title,description:desc||''}),
    });
    return r.ok?await r.json():null;
  }catch(e){return null;}
}
async function apiGoalUpdate(id,data){
  if(!TID||typeof id==='string')return;
  try{
    await fetch('/api/webapp/goals/'+id+'?telegram_id='+TID,{
      method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data),
    });
  }catch(e){}
}
async function apiGoalDelete(id){
  if(!TID||typeof id==='string')return;
  try{await fetch('/api/webapp/goals/'+id+'?telegram_id='+TID,{method:'DELETE'});}catch(e){}
}
async function loadGoalsAPI(){
  if(!TID)return;
  try{
    const r=await fetch('/api/webapp/goals?telegram_id='+TID);
    if(!r.ok)return;
    const ag=await r.json();
    const local=S.goals.filter(g=>typeof g.id==='string'&&!g._api);
    S.goals=[
      ...ag.map(g=>({id:g.id,title:g.title,description:g.description||'',type:g.goal_type,period:g.period,completed:g.completed,createdAt:g.created_at,_api:true})),
      ...local,
    ];
    sv();render();
  }catch(e){}
}
function parseGid(id){return /^\d+$/.test(String(id))?Number(id):id;}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function ni(){return new Date().toISOString();}
function ds(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function today(){return ds(new Date());}

const MUZ=['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
const MS=['Yan','Fev','Mar','Apr','May','Iyu','Iyl','Avg','Sen','Okt','Noy','Dek'];
const DUZ=['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
const DS=['Ya','Du','Se','Ch','Pa','Ju','Sh'];

function fmtD(d){return DUZ[d.getDay()]+', '+d.getDate()+' '+MUZ[d.getMonth()];}
function fmtMY(y,m){return MUZ[m]+' '+y;}

function wkDates(off=0){
  const n=new Date();n.setDate(n.getDate()+off*7);
  const day=n.getDay(),mon=new Date(n);
  mon.setDate(n.getDate()-((day+6)%7));
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function calDays(y,m){
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const sd=(first.getDay()+6)%7,days=[];
  for(let i=0;i<sd;i++){const d=new Date(y,m,-sd+i+1);days.push({date:d,tm:false});}
  for(let i=1;i<=last.getDate();i++){days.push({date:new Date(y,m,i),tm:true});}
  while(days.length%7!==0){const d=new Date(y,m+1,days.length-last.getDate()-sd+1);days.push({date:d,tm:false});}
  return days;
}

function lvl(score){
  if(score>=500)return{lv:'Legenda',em:'👑',next:null};
  if(score>=200)return{lv:'Master',em:'💎',next:500};
  if(score>=100)return{lv:'Pro',em:'🥇',next:200};
  if(score>=50) return{lv:"O'rta",em:'🥈',next:100};
  return             {lv:'Yangi',em:'🌱',next:50};
}

function themeBtn(){

window.tG=async function(id){
  const gid=parseGid(id);
  const nc=!S.goals.find(g=>g.id==gid)?.completed;
  S.goals=S.goals.map(g=>g.id==gid?{...g,completed:nc}:g);
  sv();render();

};

window.dG=async function(id){

};

// ── STATS ─────────────────────────────────────────────
function rStats(el){
  const n=new Date();
  const tDone=S.tasks.filter(t=>t.status==='done').length;
  const tFail=S.tasks.filter(t=>t.status==='failed').length;
  const tGoal=S.goals.length;
  const dGoal=S.goals.filter(g=>g.completed).length;
  const aGoal=tGoal-dGoal;
  const streak=S.user.streak||0;
  const score=S.user.total_score||0;

  // Weekly (real data)
  const wk=Array.from({length:7},(_,i)=>{
    const d=new Date(n);d.setDate(n.getDate()-6+i);
    const dds=ds(d);
    const dt=S.tasks.filter(t=>t.plan_date===dds);
    const wdn=['Du','Se','Ch','Pa','Ju','Sh','Ya'];
    return{l:wdn[(d.getDay()+6)%7],done:dt.filter(t=>t.status==='done').length,fail:dt.filter(t=>t.status==='failed').length,tot:dt.length};
  });
  // Monthly (real data)
  const mo=Array.from({length:6},(_,i)=>{
    const d=new Date(n.getFullYear(),n.getMonth()-5+i,1);
    const pfx=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const mt=S.tasks.filter(t=>t.plan_date&&t.plan_date.startsWith(pfx));
    return{l:MS[d.getMonth()],done:mt.filter(t=>t.status==='done').length};
  });
  // Heatmap (real data)
  const hm=Array.from({length:70},(_,i)=>{
    const d=new Date(n);d.setDate(n.getDate()-69+i);
    return S.tasks.filter(t=>t.plan_date===ds(d)&&t.status==='done').length;
  });
  const maxH=Math.max(...hm,1);
  const maxW=Math.max(...wk.map(d=>d.tot),1);
  const maxM=Math.max(...mo.map(d=>d.done),1);

  const ach=[
    {em:'🔥',tl:'Streak ustasi',dc:`${streak} kun`,e:streak>=3,c:'#f97316'},

    {em:'✅',tl:'Vazifa bajaruvchi',dc:`${tDone} ta`,e:tDone>=5,c:'#10b981'},
    {em:'🎯',tl:'Maqsad belgilovchi',dc:`${tGoal} ta`,e:tGoal>=3,c:'#0ea5e9'},
    {em:'💪',tl:'Muntazam',dc:'7 kun ketma-ket',e:streak>=7,c:'#8b5cf6'},
    {em:'🏆',tl:'Chempion',dc:'100+ ball',e:score>=100,c:'#f59e0b'},
  ];

  // SVG line chart for monthly
  const W=300,H=80,P=12;

    x:P+(i/(mo.length-1))*(W-P*2),
    y:P+(1-d.done/maxM)*(H-P*2),
  }));
  const line=pts.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area=`${line} L${(W-P).toFixed(1)},${H} L${P},${H} Z`;

  el.innerHTML=`
  <div class="sh" style="padding:16px 18px 14px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div><h1 style="font-size:22px;font-weight:800;color:var(--text)">Statistika 📊</h1><p style="font-size:13px;color:var(--sub)">Unumdorligingizni kuzating</p></div>
      ${themeBtn()}
    </div>
  </div>
  <div style="padding:14px 16px 0">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${[
        {i:'fl',v:streak,l:'Kunlik zanjir',c:'#f97316',bg:'rgba(249,115,22,.12)'},
        {i:'st',v:score,l:'Umumiy ball',c:'#f59e0b',bg:'rgba(245,158,11,.12)'},
        {i:'cc',v:tDone,l:'Bajarilgan',c:'#10b981',bg:'rgba(16,185,129,.12)'},

      ].map(s=>`

          <p style="font-size:12px;color:var(--sub);margin-top:4px">${s.l}</p>
        </div>`).join('')}
    </div>

    <!-- Weekly bar chart -->
    <div class="gc" style="padding:18px 16px;margin-bottom:14px">
      <p class="sl">Haftalik bajarilish (haqiqiy ma'lumot)</p>
      <div style="display:flex;align-items:flex-end;gap:5px;height:110px">

              ${fH>0?`<div style="background:rgba(239,68,68,.5);border-radius:4px 4px 0 0;height:${fH}px"></div>`:''}
              ${dH>0?`<div style="background:var(--grad);border-radius:${fH?'0':'4px 4px'} 0 0;height:${dH}px"></div>`:''}
              ${dH===0&&fH===0?`<div style="height:3px;border-radius:3px;background:var(--glass-b)"></div>`:''}

      </div>

    <!-- Monthly SVG chart -->
    <div class="gc" style="padding:18px 16px;margin-bottom:14px">
      <p class="sl">Oylik trendi – so'nggi 6 oy (haqiqiy)</p>
      <svg viewBox="0 0 ${W} ${H+20}" style="width:100%;height:110px;display:block">
        <defs><linearGradient id="mg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0ea5e9" stop-opacity=".3"/><stop offset="100%" stop-color="#10b981" stop-opacity="0"/></linearGradient></defs>
        <path d="${area}" fill="url(#mg)"/>
        <path d="${line}" fill="none" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${pts.map((p,i)=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="#0ea5e9"/><text x="${p.x.toFixed(1)}" y="${H+16}" text-anchor="middle" font-size="9" fill="var(--sub)">${mo[i].l}</text>`).join('')}
      </svg>

    <!-- Heatmap -->
    <div class="gc" style="padding:18px 16px;margin-bottom:14px">
      <p class="sl">Faollik xaritasi – so'nggi 70 kun (haqiqiy)</p>
      <div style="display:flex;flex-wrap:wrap;gap:3px">

      </div>
    </div>

    <!-- Achievements -->
    <div class="gc" style="padding:18px 16px;margin-bottom:14px">
      <p class="sl">Yutuqlar</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        ${ach.map(a=>`

    </div>
  </div>`;
}

      <div class="sr">
        <div class="si">${ic('globe',18,2)}</div>
        <span style="flex:1;font-size:15px;color:var(--text);font-weight:500">Til</span>
        <span style="font-size:13px;color:var(--sub)">O'zbekcha</span>
        ${ic('cr',16)}
      </div>
      <div class="sr">
        <div class="si">${ic('sh',18,2)}</div>
        <span style="flex:1;font-size:15px;color:var(--text);font-weight:500">Maxfiylik siyosati</span>
        ${ic('cr',16)}
      </div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--sub);padding-bottom:8px">Intizom AI v2.0 · Made with ❤️</p>
  </div>`;
}
window.tN=function(){S.notifs=!S.notifs;sv();render();};

// ── MODALS ────────────────────────────────────────────
function showM(m){
  const ov=document.createElement('div');
  ov.className='mov';ov.id='mOv';
  ov.innerHTML=`<div class="ms"><div class="mh"></div>${m.tp==='task'?mTask(m.data):mGoal(m)}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)cM();});
  document.getElementById('app').appendChild(ov);
  setTimeout(()=>{const i=ov.querySelector('input');if(i)i.focus();},120);
  // Add ripple to buttons
  ov.querySelectorAll('.btn').forEach(b=>{
    b.addEventListener('click',function(e){
      const r=document.createElement('span');r.className='ripple';
      const rc=this.getBoundingClientRect(),sz=Math.max(rc.width,rc.height);
      r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rc.left-sz/2}px;top:${e.clientY-rc.top-sz/2}px`;
      this.appendChild(r);setTimeout(()=>r.remove(),600);
    });
  });
}
function cM(){const o=document.getElementById('mOv');if(o)o.remove();}
window.cMR=function(){S.modal=null;cM();};

function mTask(t){
  const td=today();
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <span style="font-size:18px;font-weight:700;color:var(--text)">${t?'Vazifani tahrirlash':'Yangi vazifa'}</span>
    <button onclick="cMR()" style="width:36px;height:36px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;color:var(--sub);cursor:pointer">${ic('x',18)}</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px">
    <input class="inp" id="tt" placeholder="Vazifa nomi *" value="${t?t.title:''}">
    <input class="inp" id="td" placeholder="Izoh (ixtiyoriy)" value="${t?t.description||'':''}">
    <input class="inp" id="ttm" type="time" value="${t?t.scheduled_time||'':''}">
    <input class="inp" id="tdt" type="date" value="${t?t.plan_date:td}">
    <select class="inp" id="tst">
      ${['pending','done','failed'].map(s=>`<option value="${s}" ${(t?.status||'pending')===s?'selected':''}>${s==='pending'?'Kutilmoqda':s==='done'?'Bajarildi':'Bajarilmadi'}</option>`).join('')}
    </select>
    <button class="btn" onclick="svT('${t?t.id:''}')" style="margin-top:4px">${t?'Saqlash':"Qo'shish"}</button>
  </div>`;
}

function mGoal(m){
  const g=m.data;
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <span style="font-size:18px;font-weight:700;color:var(--text)">${g?'Maqsadni tahrirlash':'Yangi maqsad'}</span>
    <button onclick="cMR()" style="width:36px;height:36px;border-radius:10px;background:var(--glass);border:1px solid var(--glass-b);display:flex;align-items:center;justify-content:center;color:var(--sub);cursor:pointer">${ic('x',18)}</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px">
    <input class="inp" id="gt" placeholder="Maqsad nomi *" value="${g?g.title:''}">
    <input class="inp" id="gd" placeholder="Izoh (ixtiyoriy)" value="${g?g.description||'':''}">
    <button class="btn" onclick="svG('${g?g.id:''}','${m.gType||g?.type||''}','${m.gPeriod||g?.period||''}')" style="margin-top:4px">${g?'Saqlash':"Qo'shish"}</button>
  </div>`;
}

window.svT=function(id){
  const title=document.getElementById('tt')?.value.trim();
  if(!title)return;
  const desc=document.getElementById('td')?.value.trim();
  const time=document.getElementById('ttm')?.value;
  const date=document.getElementById('tdt')?.value;
  const status=document.getElementById('tst')?.value;
  if(id){S.tasks=S.tasks.map(t=>t.id===id?{...t,title,description:desc,scheduled_time:time,plan_date:date,status}:t);}
  else{S.tasks.push({id:uid(),title,description:desc,scheduled_time:time,plan_date:date,status:status||'pending',score_value:5,createdAt:ni()});}
  sv();S.modal=null;render();
};
window.svG=async function(id,type,period){
  const title=document.getElementById('gt')?.value.trim();
  if(!title)return;
  const desc=document.getElementById('gd')?.value.trim()||'';
  if(id){
    const gid=parseGid(id);
    S.goals=S.goals.map(g=>g.id==gid?{...g,title,description:desc}:g);
    await apiGoalUpdate(gid,{title,description:desc});
  }else{
    const ag=await apiGoalCreate(type,period,title,desc);
    if(ag){
      S.goals.push({id:ag.id,title:ag.title,description:ag.description||'',type:ag.goal_type,period:ag.period,completed:false,createdAt:ag.created_at,_api:true});
    }else{
      S.goals.push({id:uid(),title,description:desc,type,period,completed:false,createdAt:ni()});
    }
  }
  sv();S.modal=null;render();
};

// ── API ───────────────────────────────────────────────
async function loadAPI(){
  if(!TID)return;
  try{
    const r=await fetch('/api/webapp/plans?telegram_id='+TID);
    if(!r.ok)return;
    const data=await r.json();
    if(data.user)S.user={...S.user,...data.user};
    if(data.plans&&data.plans.length){
      const td=today();
      const ap=data.plans.map(p=>({id:'api_'+p.id,title:p.title,description:p.description||'',status:p.status,score_value:p.score_value||5,plan_date:td,scheduled_time:p.scheduled_time||'',createdAt:ni(),_api:true}));
      S.tasks=[...ap,...S.tasks.filter(t=>!t._api)];
    }
    sv();render();
  }catch(e){}
  // Load goals from server
  await loadGoalsAPI();
}

// ── BOOT ──────────────────────────────────────────────
apT();render();loadAPI();
})();
</script>
</body>
</html>
